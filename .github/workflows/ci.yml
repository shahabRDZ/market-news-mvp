name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mni
          POSTGRES_PASSWORD: mni
          POSTGRES_DB: mni
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mni -d mni"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mni:mni@localhost:5432/mni
      REDIS_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head
      - name: Import check
        working-directory: backend
        run: python -c "from app.main import app; print('ok', app.title)"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Typecheck + build
        working-directory: frontend
        run: npm run build
