services:
  db:
    image: postgres:16-alpine
    container_name: mni_db
    environment:
      POSTGRES_USER: mni
      POSTGRES_PASSWORD: mni
      POSTGRES_DB: mni
    ports:
      - "5432:5432"
    volumes:
      - mni_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mni -d mni"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mni_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - mni_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: mni_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mni:mni@db:5432/mni
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - mni_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: mni_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

volumes:
  mni_data:
  mni_pg:
  mni_redis:
