services:
  backend:
    build: ./backend
    container_name: mni_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - mni_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: mni_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  # Optional cache / pubsub. Enable with: docker compose --profile cache up
  redis:
    image: redis:7-alpine
    container_name: mni_redis
    profiles: ["cache"]
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - mni_redis:/data

volumes:
  mni_data:
  mni_redis:
