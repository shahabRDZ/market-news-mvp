databases:
  - name: mni-db
    plan: free
    databaseName: mni
    user: mni

services:
  - type: redis
    name: mni-redis
    plan: free
    ipAllowList: []

  - type: web
    name: mni-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mni-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mni-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: MOCK_MODE
        value: auto
      - key: POLL_NEWS_SECONDS
        value: "60"
      - key: POLL_MARKET_SECONDS
        value: "60"
      - key: NEWSAPI_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_PREMIUM
        sync: false
      - key: STRIPE_PRICE_TEAM
        sync: false
      - key: STRIPE_PRICE_API
        sync: false
      - key: BILLING_SUCCESS_URL
        sync: false
      - key: BILLING_CANCEL_URL
        sync: false
